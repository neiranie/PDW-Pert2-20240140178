<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Drifting Soul | neiranie</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 50px 40px;
            width: 85%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .title {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #0f172a; 
            margin: 0 0 25px 0;
            font-weight: 400;
        }

        .image-container {
            overflow: hidden;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        .image-container img {
            width: 100%;
            display: block;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .description {
            color: rgba(15, 23, 42, 0.85);
            line-height: 1.8;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
        }

        .category-label {
            color: #0f172a;
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
            letter-spacing: 1px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
    </style>
</head>

<body style="margin:0; padding:20px; display:flex; justify-content:center; align-items:center; min-height:100vh; background-color: #0f172a;">

    <div class="glass-card">
        <h1 class="title">The Drifting Soul</h1>
        
        <div class="image-container">
            <img src="jellyfish4k.jpg" alt="Jellyfish">
        </div>

        <p class="description">
            <span class="category-label">Jellyfish (noun)</span>
            A stray thought of the ocean, woven from salt and starlight, dancing in the weightless blue where the only anchor is the rhythm of the tide.
        </p>
    </div>

</body>
</html>
